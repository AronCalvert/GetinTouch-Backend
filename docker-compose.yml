
# build and start all services
#   docker compose up --build

# rebuild only changes and start all services
#   docker compose up -d

# build only the images
#   docker compose build

# start all services
#   docker compose up

# stop all services
#   docker compose down

# stop all services and remove volumes (if you want a fresh postgresql database)
#   docker compose down -v

# Volumes are files that would not regularly be included in the image
# But are needed for the app to run

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  backend:
    build:
      dockerfile: Dockerfile
    container_name: springboot_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      ADMIN_SECRET: ${ADMIN_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT}
      LOGGING_LEVEL_SPRING_SECURITY: ${LOGGING_LEVEL_SPRING_SECURITY}
      LOGGING_LEVEL_SPRING_WEB: ${LOGGING_LEVEL_SPRING_WEB}
      LOGGING_LEVEL_APP: ${LOGGING_LEVEL_APP}
    depends_on:
      - postgres
    networks:
      - backend-network
  
  frontend:
    build:
      context: ../GetInTouch-Frontend
      dockerfile: Dockerfile
    container_name: react_app
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - backend-network

volumes:
  postgres_data:

networks:
  backend-network:
