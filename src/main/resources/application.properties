spring.application.name=Backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
spring.mvc.servlet.path=/api
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:WARN}
logging.level.org.springframework.web=${LOGGING_LEVEL_SPRING_WEB:INFO}
logging.level.com.cs4135.Backend=${LOGGING_LEVEL_APP:INFO}
admin.secret=${ADMIN_SECRET}

# HikariCP connection pool timeouts
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
